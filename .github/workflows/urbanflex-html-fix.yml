name: UrbanFlex HTML correction

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  correct:
    if: github.event.issue.title == 'Apply UrbanFlex HTML correction'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Replace SVG labels with HTML
        run: |
          python3 - <<'PY'
          from pathlib import Path

          html_path = Path('product/urbanflex/index.html')
          css_path = Path('assets/css/urbanflex.css')
          svg_path = Path('assets/img/urbanflex/urbanflex_hero_labels.svg')

          html = html_path.read_text(encoding='utf-8')
          html = html.replace('try{courbanflex_tophero_20260721_left.pngnst r=await fetch', 'try{const r=await fetch', 1)
          html = html.replace('/assets/css/urbanflex.css?v=1.4', '/assets/css/urbanflex.css?v=1.6', 1)

          old = '''      <!-- 右：コラージュ画像 -->
      <div class="col-12 col-lg-5 d-flex align-items-center justify-content-center p-3 rounded-4"
           style="background-color:#F2F6F7; min-height: clamp(300px, 38vw, 520px);">
        <img
          src="/assets/img/urbanflex/urbanflex_20260722_right.jpg"
          alt="3WAYビジネスリュックのバックパック／ブリーフ／キャリーオン使用イメージ"
          class="img-fluid"
          style="max-width:100%; max-height:100%; object-fit:contain; object-position:center;">
      </div>'''

          new = '''      <!-- 右：コラージュ画像＋SEO対応HTMLテキスト -->
      <div class="col-12 col-lg-5">
        <div class="uf-modes-panel rounded-4">
          <div class="uf-modes-canvas">
            <img src="/assets/img/urbanflex/urbanflex_20260722_right.jpg"
                 alt="UrbanFlexをバックパック、ビジネスバッグ、ショルダーバッグ、キャリーオンで使用するイメージ"
                 class="uf-modes-image">
            <div class="uf-modes-title">
              <span class="uf-modes-title-main">3WAY</span>
              <span class="uf-modes-title-sub">+ Carry on</span>
            </div>
            <div class="uf-mode-label uf-mode-backpack"><span class="uf-mode-en" lang="en">BACKPACK</span><span class="uf-mode-jp">リュック</span></div>
            <div class="uf-mode-label uf-mode-briefcase"><span class="uf-mode-en" lang="en">BRIEFCASE</span><span class="uf-mode-jp">ビジネス<br>バッグ</span></div>
            <div class="uf-mode-label uf-mode-shoulder"><span class="uf-mode-en" lang="en">SHOULDER BAG</span><span class="uf-mode-jp">ショルダー<br>バッグ</span></div>
            <div class="uf-mode-label uf-mode-carry"><span class="uf-mode-en" lang="en">CARRY ON</span><span class="uf-mode-jp">キャリー<br>オン</span></div>
            <p class="uf-modes-note">※ショルダーバッグ用のストラップは付属しません</p>
          </div>
        </div>
      </div>'''

          if old not in html:
              raise SystemExit('Target hero block not found')
          html_path.write_text(html.replace(old, new, 1), encoding='utf-8')

          css = css_path.read_text(encoding='utf-8')
          start = css.index('/* 右ヒーロー：元画像とは別レイヤーで文字を重ねる */')
          end = css.index('/* スマホ固定CTA：Amazonボタン文字の縦位置をわずかに下げる */')
          replacement = '''/* 右ヒーロー：画像上の文字はDOM上のHTMLとして配置 */
.uf-modes-panel{display:flex;align-items:center;justify-content:center;min-height:clamp(300px,38vw,520px);padding:1rem;overflow:hidden;background:#f2f6f7}
.uf-modes-canvas{position:relative;width:100%}
.uf-modes-image{display:block;width:100%;height:auto}
.uf-modes-title,.uf-mode-label,.uf-modes-note{position:absolute;z-index:2;margin:0;color:#082b52;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;pointer-events:none;text-shadow:0 1px 2px rgba(255,255,255,.9)}
.uf-modes-title{top:2.5%;left:50%;width:90%;transform:translateX(-50%);text-align:center;line-height:1.05;white-space:nowrap}
.uf-modes-title-main,.uf-modes-title-sub,.uf-mode-en,.uf-mode-jp{display:block}
.uf-modes-title-main{font-size:clamp(2rem,3.8vw,3.35rem);font-weight:800;letter-spacing:.08em}
.uf-modes-title-sub{margin-top:.08em;font-size:clamp(.95rem,1.65vw,1.45rem);font-weight:700}
.uf-mode-label{width:42%;line-height:1.15;font-weight:700}
.uf-mode-en{font-size:clamp(.72rem,1.05vw,.98rem);white-space:nowrap}
.uf-mode-jp{margin-top:.38em;font-size:clamp(.68rem,.95vw,.9rem);line-height:1.22}
.uf-mode-backpack{top:18.5%;left:3.2%}.uf-mode-briefcase{top:18.5%;left:53.2%}.uf-mode-shoulder{top:59.2%;left:3.2%}.uf-mode-carry{top:59.2%;left:53.2%}
.uf-modes-note{right:2.4%;bottom:1.15%;left:2.4%;font-size:clamp(.68rem,.9vw,.82rem);font-weight:700;line-height:1.35;text-align:center;white-space:nowrap}
@media(max-width:575.98px){.uf-modes-panel{min-height:0;padding:.75rem}.uf-mode-en{font-size:clamp(.65rem,3vw,.8rem)}.uf-mode-jp{font-size:clamp(.61rem,2.7vw,.76rem)}.uf-modes-note{font-size:clamp(.6rem,2.45vw,.72rem)}}

'''
          css = css[:start] + replacement + css[end:]
          css = css.replace('assets/css/urbanflex.css  (v1.5)', 'assets/css/urbanflex.css  (v1.6)', 1)
          css_path.write_text(css, encoding='utf-8')

          if svg_path.exists():
              svg_path.unlink()
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace UrbanFlex SVG labels with SEO-readable HTML"
          git push origin HEAD:main
