name: Apply UrbanFlex hero text overlay

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'urbanflex-hero-overlay-trigger'
    runs-on: ubuntu-latest
    steps:
      - name: Check out trigger branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Update UrbanFlex hero
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          html_path = Path('product/urbanflex/index.html')
          css_path = Path('assets/css/urbanflex.css')
          workflow_path = Path('.github/workflows/apply-urbanflex-hero-labels.yml')
          trigger_path = Path('.github/urbanflex-overlay-trigger.txt')

          html = html_path.read_text(encoding='utf-8')

          # Fix the accidental filename text that currently breaks the head include script.
          broken_loader = 'try{courbanflex_tophero_20260721_left.pngnst r=await fetch'
          fixed_loader = 'try{const r=await fetch'
          if broken_loader in html:
              html = html.replace(broken_loader, fixed_loader, 1)

          # Bust the UrbanFlex stylesheet cache.
          html = html.replace('/assets/css/urbanflex.css?v=1.4', '/assets/css/urbanflex.css?v=1.5', 1)

          old_block = '''      <!-- 右：コラージュ画像 -->
      <div class="col-12 col-lg-5 d-flex align-items-center justify-content-center p-3 rounded-4"
           style="background-color:#F2F6F7; min-height: clamp(300px, 38vw, 520px);">
        <img
          src="/assets/img/urbanflex/urbanflex_20260722_right.jpg"
          alt="3WAYビジネスリュックのバックパック／ブリーフ／キャリーオン使用イメージ"
          class="img-fluid"
          style="max-width:100%; max-height:100%; object-fit:contain; object-position:center;">
      </div>'''

          new_block = '''      <!-- 右：コラージュ画像＋HTMLテキスト -->
      <div class="col-12 col-lg-5">
        <div class="uf-modes-panel rounded-4">
          <img
            src="/assets/img/urbanflex/urbanflex_20260722_right.jpg"
            alt="3WAYビジネスリュックのバックパック／ビジネスバッグ／ショルダーバッグ／キャリーオン使用イメージ"
            class="uf-modes-image">

          <div class="uf-modes-title">
            <span class="uf-modes-title-main">3WAY</span>
            <span class="uf-modes-title-sub">+ Carry on</span>
          </div>

          <div class="uf-mode-label uf-mode-backpack">
            <span class="uf-mode-en">BACKPACK</span>
            <span class="uf-mode-jp">リュック</span>
          </div>

          <div class="uf-mode-label uf-mode-briefcase">
            <span class="uf-mode-en">BRIEFCASE</span>
            <span class="uf-mode-jp">ビジネスバッグ</span>
          </div>

          <div class="uf-mode-label uf-mode-shoulder">
            <span class="uf-mode-en">SHOULDER BAG</span>
            <span class="uf-mode-jp">ショルダーバッグ</span>
          </div>

          <div class="uf-mode-label uf-mode-carry">
            <span class="uf-mode-en">CARRY ON</span>
            <span class="uf-mode-jp">キャリーオン</span>
          </div>
        </div>
      </div>'''

          if old_block not in html:
              raise SystemExit('UrbanFlex right hero block was not found; no files were changed.')

          html = html.replace(old_block, new_block, 1)
          html_path.write_text(html, encoding='utf-8')

          css = css_path.read_text(encoding='utf-8')
          css = css.replace('assets/css/urbanflex.css  (v1.4d)', 'assets/css/urbanflex.css  (v1.5)', 1)

          marker = '/* UrbanFlex right hero: 3WAY usage labels */'
          if marker not in css:
              css += r'''

/* UrbanFlex right hero: 3WAY usage labels */
.uf-modes-panel{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:clamp(300px, 38vw, 520px);
  padding:1rem;
  overflow:hidden;
  background:#f2f6f7;
}

.uf-modes-image{
  display:block;
  width:100%;
  height:auto;
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  object-position:center;
}

.uf-modes-title,
.uf-mode-label{
  position:absolute;
  z-index:2;
  color:#082b52;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  line-height:1.15;
  pointer-events:none;
  text-shadow:0 1px 2px rgba(255,255,255,.9);
}

.uf-modes-title{
  top:2.6%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  text-align:center;
  white-space:nowrap;
}

.uf-modes-title-main,
.uf-modes-title-sub,
.uf-mode-en,
.uf-mode-jp{
  display:block;
}

.uf-modes-title-main{
  font-size:clamp(2rem, 3.8vw, 3.35rem);
  font-weight:800;
  letter-spacing:.1em;
}

.uf-modes-title-sub{
  margin-top:.05em;
  font-size:clamp(.95rem, 1.65vw, 1.45rem);
  font-weight:650;
  letter-spacing:.02em;
}

.uf-mode-label{
  width:41%;
  font-weight:700;
}

.uf-mode-en{
  font-size:clamp(.72rem, 1.05vw, .98rem);
  letter-spacing:.025em;
  white-space:nowrap;
}

.uf-mode-jp{
  margin-top:.45em;
  font-size:clamp(.68rem, .95vw, .9rem);
  line-height:1.35;
}

.uf-mode-backpack{
  top:16.8%;
  left:4.5%;
}

.uf-mode-briefcase{
  top:16.8%;
  left:54%;
}

.uf-mode-shoulder{
  top:57.5%;
  left:4.5%;
}

.uf-mode-carry{
  top:57.5%;
  left:54%;
}

@media (max-width:575.98px){
  .uf-modes-panel{
    min-height:0;
    padding:.75rem;
  }

  .uf-mode-label{
    width:42%;
  }

  .uf-mode-en{
    font-size:clamp(.66rem, 3vw, .8rem);
  }

  .uf-mode-jp{
    font-size:clamp(.62rem, 2.7vw, .76rem);
  }
}
'''

          css_path.write_text(css, encoding='utf-8')

          # Remove the one-time trigger and workflow from the branch.
          if trigger_path.exists():
              trigger_path.unlink()
          if workflow_path.exists():
              workflow_path.unlink()
          PY

      - name: Commit changes to trigger branch
        shell: bash
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add HTML labels to UrbanFlex hero modes"
          git push origin HEAD:"${BRANCH_NAME}"
